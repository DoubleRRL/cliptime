services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: ${FRONTEND_BUILD_TARGET:-development}
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    container_name: supoclip-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/prisma:/app/prisma
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - NEXT_TELEMETRY_DISABLED=1
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - BACKEND_INTERNAL_URL=http://backend:8000
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - NEXT_PUBLIC_LANDING_ONLY_MODE=${NEXT_PUBLIC_LANDING_ONLY_MODE:-false}
      - BACKEND_AUTH_SECRET=${BACKEND_AUTH_SECRET}
      - DATABASE_URL=postgresql://supoclip:supoclip_password@postgres:5432/supoclip
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-supoclip_dev_secret_change_in_production}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: supoclip-backend
    platform: linux/amd64
    command: [".venv/bin/uvicorn", "src.main_refactored:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/migrations:/app/migrations
      - uploads:/app/uploads
      - ./backend/fonts:/app/fonts
      - ./backend/transitions:/app/transitions
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment: &backend-env
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql+asyncpg://supoclip:supoclip_password@postgres:5432/supoclip
      - TEMP_DIR=/app/uploads
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - ASSEMBLY_AI_API_KEY=${ASSEMBLY_AI_API_KEY}
      - APIFY_API_TOKEN=${APIFY_API_TOKEN}
      - APIFY_YOUTUBE_DEFAULT_QUALITY=${APIFY_YOUTUBE_DEFAULT_QUALITY:-1080}
      - YOUTUBE_DATA_API_KEY=${YOUTUBE_DATA_API_KEY}
      - YOUTUBE_METADATA_PROVIDER=${YOUTUBE_METADATA_PROVIDER:-yt_dlp}
      - LLM=${LLM:-ollama:llama3.2:3b}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      - HOST_TOTAL_RAM_GB=${HOST_TOTAL_RAM_GB:-}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY}
      - QUEUED_TASK_TIMEOUT_SECONDS=${QUEUED_TASK_TIMEOUT_SECONDS:-180}
      - PROCESSING_TASK_TIMEOUT_SECONDS=${PROCESSING_TASK_TIMEOUT_SECONDS:-14400}
      - WORKER_MAX_JOBS=${WORKER_MAX_JOBS:-1}
      - WORKER_JOB_TIMEOUT_SECONDS=${WORKER_JOB_TIMEOUT_SECONDS:-21600}
      - DEFAULT_PROCESSING_MODE=${DEFAULT_PROCESSING_MODE:-quality}
      - DEFAULT_CAPTION_TEMPLATE=${DEFAULT_CAPTION_TEMPLATE:-riverside}
      - FAST_MODE_MAX_CLIPS=${FAST_MODE_MAX_CLIPS:-4}
      - BALANCED_MODE_MAX_CLIPS=${BALANCED_MODE_MAX_CLIPS:-7}
      - QUALITY_MODE_MAX_CLIPS=${QUALITY_MODE_MAX_CLIPS:-14}
      - FAST_MODE_TRANSCRIPT_MODEL=${FAST_MODE_TRANSCRIPT_MODEL:-nano}
      - LOCAL_LLM_CONCURRENCY=${LOCAL_LLM_CONCURRENCY:-1}
      - TRANSCRIPT_WINDOW_SECONDS=${TRANSCRIPT_WINDOW_SECONDS:-300}
      - TRANSCRIPT_WINDOW_OVERLAP=${TRANSCRIPT_WINDOW_OVERLAP:-30}
      - ANALYSIS_MAX_WINDOWS=${ANALYSIS_MAX_WINDOWS:-12}
      - MICRO_PER_WINDOW=${MICRO_PER_WINDOW:-3}
      - DEEP_PER_WINDOW=${DEEP_PER_WINDOW:-2}
      - OLLAMA_NUM_PREDICT=${OLLAMA_NUM_PREDICT:-4096}
      - QUALITY_MODE_MAX_MICRO=${QUALITY_MODE_MAX_MICRO:-8}
      - QUALITY_MODE_MAX_DEEP=${QUALITY_MODE_MAX_DEEP:-6}
      - SIGNAL_FIRST_ANALYSIS=${SIGNAL_FIRST_ANALYSIS:-false}
      - SIGNAL_PATCH_PAD_SECONDS=${SIGNAL_PATCH_PAD_SECONDS:-45}
      - SIGNAL_PATCH_MAX_CHARS=${SIGNAL_PATCH_MAX_CHARS:-1500}
      - ASSEMBLYAI_SENTIMENT_ENTITIES=${ASSEMBLYAI_SENTIMENT_ENTITIES:-false}
      - PARALLEL_CLIP_RENDERS=${PARALLEL_CLIP_RENDERS:-2}
      - BACKEND_AUTH_SECRET=${BACKEND_AUTH_SECRET}
      - AUTH_SIGNATURE_TTL_SECONDS=${AUTH_SIGNATURE_TTL_SECONDS:-300}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://sp.localhost:3000}
      - DISCORD_FEEDBACK_WEBHOOK_URL=${DISCORD_FEEDBACK_WEBHOOK_URL}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Worker process for background video processing
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: supoclip-worker
    platform: linux/amd64
    command: [".venv/bin/arq", "src.workers.tasks.WorkerSettings"]
    volumes:
      - ./backend/src:/app/src
      - ./backend/migrations:/app/migrations
      - uploads:/app/uploads
      - ./backend/fonts:/app/fonts
      - ./backend/transitions:/app/transitions
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment: *backend-env
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", ".venv/bin/arq", "--check", "src.workers.tasks.WorkerSettings"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s

  # Redis for caching and job queues (useful for video processing)
  redis:
    image: redis:7-alpine
    container_name: supoclip-redis
    ports:
      - "6379:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    command:
      [
        "sh",
        "-c",
        "if [ -n \"$${REDIS_PASSWORD}\" ]; then exec docker-entrypoint.sh redis-server --requirepass \"$${REDIS_PASSWORD}\"; fi; exec docker-entrypoint.sh redis-server",
      ]
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "if [ -n \"$${REDIS_PASSWORD}\" ]; then redis-cli -a \"$${REDIS_PASSWORD}\" ping; else redis-cli ping; fi",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL database for storing video metadata, user data, etc.
  postgres:
    image: postgres:15-alpine
    container_name: supoclip-postgres
    environment:
      POSTGRES_DB: supoclip
      POSTGRES_USER: supoclip
      POSTGRES_PASSWORD: supoclip_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supoclip -d supoclip"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  uploads:
    driver: local
  redis_data:
    driver: local
  postgres_data:
    driver: local

networks:
  default:
    name: supoclip-network
